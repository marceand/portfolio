baseURL = 'https://marcelino-portfolio.netlify.app/'
languageCode = 'en-us'
title = 'Marcelino Yax'
theme = "gokarna"
enableRobotsTXT = true
pygmentsStyle = "dracula"

[params]
  footer = "Marcelino"
  avatarURL = "/images/marcelino-avatar.jpg"
  AvatarAltText = "avatar"
  avatarSize = "size-m"

  socialIcons = [
    {name = "twitter", url = "https://twitter.com/imarce7j"},
    {name = "linkedin", url = "https://www.linkedin.com/pub/marcelino-yax/b6/a4a/833gu"},
    {name = "github", url = "https://github.com/marceand"},
    {name = "email", url = "mailto:marce7j@gmail.com"}
  ]

    customHeadHTML = '''
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" integrity="sha384-vlBdW0r3AcZO/HboRPznQNowvexd3fY8qHOWkBi5q7KGgqJ+F48+DceybYmrVbmB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" integrity="sha384-AtrdNsnxl/75rvBneBVH7DtOvCxSVahR2zWqle1coBKd8DEmLoviqNeJSx64gNAs" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/custom-style/custom-main.css">
    <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderMathInElement(document.body, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false
      });
    });
    </script>
    '''

[menu]
  [[menu.main]]
    name = "Home"
    pre = "<span data-feather='home'></span>"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Resume"
    pre = "<span data-feather='user'></span>"
    url = "/about/resume"
    weight = 2

  [[menu.main]]
    name = "Posts"
    pre = "<span data-feather='book'></span>"
    url = "/posts/"
    weight = 3

  [[menu.main]]
    name = "Projects"
    pre = "<span data-feather='code'></span>"
    url = "/projects/project"
    weight = 4
  
[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
    ordered = false
    
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]